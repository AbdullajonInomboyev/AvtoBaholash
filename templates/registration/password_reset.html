<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AvtoBaholash — Parol tiklash</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle}body{font-family:'Inter',sans-serif}</style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-slate-100 min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-md">
  <div class="text-center mb-8">
    <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-blue-900 to-blue-600 flex items-center justify-center text-white shadow-xl mx-auto mb-4">
      <span class="material-symbols-outlined text-2xl" style="font-variation-settings:'FILL' 1">lock_reset</span>
    </div>
    <h1 class="text-2xl font-extrabold text-blue-900" style="font-family:'Manrope'">AvtoBaholash</h1>
  </div>
  <div class="bg-white rounded-2xl shadow-xl border border-slate-100 p-8">
    <h2 class="text-xl font-bold text-slate-900 mb-1" style="font-family:'Manrope'">Parolni tiklash</h2>
    <p class="text-sm text-slate-500 mb-6">Email manzilingizni kiriting, havola yuboramiz</p>
    <form method="post" class="space-y-4">{% csrf_token %}
      <div>
        <label class="text-xs font-semibold text-slate-600 block mb-1">Email manzil *</label>
        {{ form.email }}
      </div>
      <button type="submit" class="w-full bg-blue-900 text-white py-3 rounded-xl font-bold text-sm hover:bg-blue-800">
        Havola yuborish
      </button>
    </form>
    <a href="/auth/login/" class="mt-4 block text-center text-sm text-blue-700 font-semibold hover:underline">← Loginga qaytish</a>
  </div>
</div>
</body></html>
